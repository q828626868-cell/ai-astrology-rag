<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>AI 知識庫</title>
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 50px auto; }
    #chatbox { border: 1px solid #ccc; height: 400px; overflow-y: auto; padding: 10px; margin-bottom: 10px; }
    .user { color: blue; margin: 10px 0; }
    .ai { color: green; margin: 10px 0; }
    input { width: 80%; padding: 8px; }
    button { padding: 8px 16px; }
  </style>
</head>
<body>
  <h2>星盤解析</h2>
  <div id="chatbox"></div>
  <input id="msg" placeholder="輸入問題...">
  <button onclick="send()">送出</button>

  <script>
    async function send() {
      let msg = document.getElementById("msg").value
      if (!msg) return

      let chatbox = document.getElementById("chatbox")
      chatbox.innerHTML += `<div class="user">你：${msg}</div>`
      document.getElementById("msg").value = ""

      let res = await fetch(`/ask?question=${encodeURIComponent(msg)}`)
      let data = await res.json()

      chatbox.innerHTML += `<div class="ai">AI：${data.answer}</div>`
      chatbox.scrollTop = chatbox.scrollHeight
    }
  </script>
</body>
</html>
